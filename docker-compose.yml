services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: infrastructure-website-app
    restart: unless-stopped
    ports:
      - "3010:3000"
    env_file:
      - .env
    environment:
      - RUN_SEED=${RUN_SEED:-true}
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: infrastructure-website-db
    restart: unless-stopped
    ports:
      - "5437:5432"
    environment:
      POSTGRES_DB: infrastructure_cms
      POSTGRES_USER: infrastructure_user
      POSTGRES_PASSWORD: change_this_password
    volumes:
      - infrastructure_website_db_data:/var/lib/postgresql/data
      - ./backups:/backups

volumes:
  infrastructure_website_db_data:
